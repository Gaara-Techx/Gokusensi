name: Compiler Gokusensi Pro

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Project
        run: |
          cordova create goku-app com.gokusensi.shop "GokuSensei"
          cd goku-app
          cordova platform add ios
          
          mkdir -p res/ios
          curl -L -o res/ios/icon.png "https://files.catbox.moe/pukmfj.jpg"
          curl -L -o res/ios/splash.png "https://files.catbox.moe/pukmfj.jpg"

          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>body{background:#000;color:white;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center;}.card{padding:30px;}h1{color:#00d1ff;}p{color:#888;}.btn{background:white;color:black;padding:12px 25px;border-radius:15px;text-decoration:none;font-weight:bold;display:inline-block;margin-top:20px;}</style></head><body><div class="card"><h1>Pas de connexion</h1><p>Verifiez votre acces internet.</p><a href="index.html" class="btn">Reessayer</a></div></body></html>' > www/offline.html
          echo '<html><head><meta http-equiv="refresh" content="0;url=https://gokusensi.com"></head><body style="background:#000"></body></html>' > www/index.html

          node -e "
          const fs = require('fs');
          let config = fs.readFileSync('config.xml', 'utf8');
          config = config.replace('src=\"index.html\"', 'src=\"https://gokusensi.com\"');
          const extra = '\n  <allow-navigation href=\"https://gokusensi.com/*\" />' +
                        '\n  <allow-navigation href=\"*\" />' +
                        '\n  <preference name=\"ErrorUrl\" value=\"offline.html\"/>' +
                        '\n  <platform name=\"ios\">' +
                        '\n    <icon src=\"res/ios/icon.png\" />' +
                        '\n    <splash src=\"res/ios/splash.png\" />' +
                        '\n    <preference name=\"AutoHideSplashScreen\" value=\"true\" />' +
                        '\n    <preference name=\"SplashScreenDelay\" value=\"3000\" />' +
                        '\n  </platform>\n';
          config = config.replace('</widget>', extra + '</widget>');
          fs.writeFileSync('config.xml', config);
          "

      - name: Build Xcode
        run: |
          cd goku-app/platforms/ios
          PROJECT_NAME=$(ls -d *.xcodeproj | head -n 1)
          SCHEME_NAME=${PROJECT_NAME%.xcodeproj}
          xcodebuild -project "$PROJECT_NAME" -scheme "$SCHEME_NAME" -configuration Release -sdk iphoneos -derivedDataPath "build_output" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build

      - name: Package IPA
        run: |
          mkdir -p ${{ github.workspace }}/ipa/Payload
          APP_PATH=$(find goku-app/platforms/ios/build_output -name "*.app" -type d | head -n 1)
          cp -R "$APP_PATH" ${{ github.workspace }}/ipa/Payload/
          cd ${{ github.workspace }}/ipa
          zip -r ${{ github.workspace }}/GokuSensei_Pro.ipa .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GokuSensei-Pro-App
          path: ${{ github.workspace }}/GokuSensei_Pro.ipa
