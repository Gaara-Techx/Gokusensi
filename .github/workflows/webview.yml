name: Compiler Gokusensi Pro Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Project
        run: |
          cordova create goku-app com.gokusensi.shop "GokuSensei"
          cd goku-app
          cordova platform add ios
          
          # 1. Téléchargement des images (Logo et Splash)
          mkdir -p res/ios
          curl -L -o res/ios/icon.png "https://files.catbox.moe/pukmfj.jpg"
          curl -L -o res/ios/splash.png "https://files.catbox.moe/pukmfj.jpg"

          # 2. SCRIPT DE DÉTECTION INTELLIGENTE (index.html)
          # Ce script vérifie la connexion avant de rediriger
          cat <<EOF > www/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <script>
                  function checkConnection() {
                      if (navigator.onLine) {
                          // Wi-Fi ou Données Mobiles OK -> Vers le site
                          window.location.href = "https://gokusensi.com";
                      } else {
                          // Aucun des deux -> Vers la page d'erreur
                          window.location.href = "offline.html";
                      }
                  }
                  window.onload = checkConnection;
              </script>
          </head>
          <body style="background:#000"></body>
          </html>
          EOF

          # 3. PAGE HORS-LIGNE (offline.html)
          cat <<EOF > www/offline.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <style>
                  body { background: #000; color: white; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                  .container { text-align: center; padding: 20px; }
                  img { width: 100px; border-radius: 22px; margin-bottom: 20px; }
                  h1 { font-size: 20px; margin-bottom: 10px; }
                  p { color: #777; margin-bottom: 30px; font-size: 14px; }
                  .btn { background: #00d1ff; color: #000; padding: 12px 30px; border-radius: 12px; text-decoration: none; font-weight: bold; }
              </style>
          </head>
          <body>
              <div class="container">
                  <img src="res/ios/icon.png" onerror="this.style.display='none'">
                  <h1>Hors-ligne</h1>
                  <p>Le Wi-Fi et les donnees mobiles sont coupes.<br>Activez internet pour continuer.</p>
                  <a href="index.html" class="btn">REESSAYER</a>
              </div>
          </body>
          </html>
          EOF

          # 4. CONFIGURATION XML (Autorisations totales)
          node -e "
          const fs = require('fs');
          let config = fs.readFileSync('config.xml', 'utf8');
          
          const extra = '\n  <access origin=\"*\" />' +
                        '\n  <allow-intent href=\"*\" />' +
                        '\n  <allow-navigation href=\"*\" />' +
                        '\n  <preference name=\"AllowInlineMediaPlayback\" value=\"true\" />' +
                        '\n  <platform name=\"ios\">' +
                        '\n    <icon src=\"res/ios/icon.png\" />' +
                        '\n    <splash src=\"res/ios/splash.png\" />' +
                        '\n    <preference name=\"AutoHideSplashScreen\" value=\"true\" />' +
                        '\n    <preference name=\"SplashScreenDelay\" value=\"3000\" />' +
                        '\n  </platform>\n';
          
          config = config.replace('</widget>', extra + '</widget>');
          fs.writeFileSync('config.xml', config);
          "

      - name: Build Xcode
        run: |
          cd goku-app/platforms/ios
          PROJECT_NAME=\$(ls -d *.xcodeproj | head -n 1)
          SCHEME_NAME=\${PROJECT_NAME%.xcodeproj}
          xcodebuild -project "\$PROJECT_NAME" -scheme "\$SCHEME_NAME" -configuration Release -sdk iphoneos -derivedDataPath "build_output" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build

      - name: Package IPA
        run: |
          mkdir -p \${{ github.workspace }}/ipa/Payload
          APP_PATH=\$(find goku-app/platforms/ios/build_output -name "*.app" -type d | head -n 1)
          cp -R "\$APP_PATH" \${{ github.workspace }}/ipa/Payload/
          cd \${{ github.workspace }}/ipa
          zip -r \${{ github.workspace }}/GokuSensei_v2.ipa .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GokuSensei-V2
          path: \${{ github.workspace }}/GokuSensei_v2.ipa
