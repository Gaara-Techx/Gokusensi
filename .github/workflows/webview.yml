name: Compiler Gokusensi IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Installer Node.js et Cordova
      run: npm install -g cordova

    - name: Créer le projet iOS Cordova
      run: |
        cordova create goku-app com.gokusensi.shop "GokuSensei"
        cd goku-app
        # On autorise la navigation vers ton domaine
        node -e "
          const fs = require('fs');
          let config = fs.readFileSync('config.xml', 'utf8');
          config = config.replace('</widget>', '  <allow-navigation href=\"https://gokusensi.com/*\" />\n</widget>');
          fs.writeFileSync('config.xml', config);
        "

    - name: Configurer l'Icône de l'application
      run: |
        cd goku-app
        mkdir -p res/icon/ios
        # Téléchargement de ton image depuis Catbox
        curl -L "https://files.catbox.moe/pukmfj.jpg" -o res/icon/ios/icon.jpg
        # Ajout de la configuration de l'icône dans le config.xml
        sed -i '' 's|</widget>|  <platform name=\"ios\">\n    <icon src=\"res/icon/ios/icon.jpg\" width=\"1024\" height=\"1024\" />\n  </platform>\n</widget>|' config.xml

    - name: Injecter l'interface (Spinner + Offline + SW)
      run: |
        cd goku-app/www
        
        # 1. Page de démarrage index.html avec SPINNER
        cat << 'EOF' > index.html
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>GokuSensei</title>
            <style>
                body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
                .loader { border: 4px solid #333; border-top: 4px solid #f0c14b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
                @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
                .container { text-align: center; }
            </style>
        </head>
        <body>
            <div class="container">
                <div class="loader"></div>
                <p>Chargement de GokuSensei...</p>
            </div>
            <script>
                async function initApp() {
                    // Enregistrement du Service Worker
                    if ("serviceWorker" in navigator) {
                        try { await navigator.serviceWorker.register("sw.js"); } catch(e) {}
                    }
                    
                    // Vérification de la connexion après un petit délai pour le look
                    setTimeout(() => {
                        if (navigator.onLine) {
                            window.location.href = "https://gokusensi.com";
                        } else {
                            window.location.href = "offline.html";
                        }
                    }, 1500);
                }
                window.onload = initApp;
            </script>
        </body>
        </html>
        EOF

        # 2. Page Offline améliorée
        cat << 'EOF' > offline.html
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Hors ligne</title>
            <style>
                body { background: #111; color: white; text-align: center; padding: 50px; font-family: sans-serif; }
                .btn { padding: 15px 30px; background: #f0c14b; border: none; border-radius: 8px; color: black; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
            </style>
        </head>
        <body>
            <h1>Pas de connexion</h1>
            <p>Désolé, GokuSensei a besoin d'internet pour fonctionner.</p>
            <a href="index.html" class="btn">RÉESSAYER</a>
        </body>
        </html>
        EOF

        # 3. Service Worker sw.js
        cat << 'EOF' > sw.js
        const CACHE_NAME = 'goku-v1';
        const FILES = ['offline.html', 'index.html'];
        self.addEventListener('install', (e) => {
            e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(FILES)));
            self.skipWaiting();
        });
        self.addEventListener('fetch', (e) => {
            if (e.request.mode === 'navigate') {
                e.respondWith(fetch(e.request).catch(() => caches.match('offline.html')));
            }
        });
        EOF

    - name: Ajouter la plateforme iOS
      run: |
        cd goku-app
        cordova platform add ios

    - name: Compiler l'application (.app)
      run: |
        cd goku-app/platforms/ios
        PROJECT_NAME=$(ls -d *.xcodeproj | head -n 1)
        SCHEME_NAME=${PROJECT_NAME%.xcodeproj}
        xcodebuild -project "$PROJECT_NAME" -scheme "$SCHEME_NAME" -configuration Release -sdk iphoneos -derivedDataPath "build_output" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build

    - name: Créer le fichier .IPA
      run: |
        mkdir -p ${{ github.workspace }}/ipa/Payload
        APP_PATH=$(find goku-app/platforms/ios/build_output -name "*.app" -type d | head -n 1)
        cp -R "$APP_PATH" ${{ github.workspace }}/ipa/Payload/
        cd ${{ github.workspace }}/ipa
        zip -r ${{ github.workspace }}/GokuSensiz.ipa .

    - name: Télécharger l'IPA
      uses: actions/upload-artifact@v4
      with:
        name: GokuSensiz-IPA
        path: ${{ github.workspace }}/GokuSensiz.ipa
