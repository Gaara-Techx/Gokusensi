name: Gokusensi Pro Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Project
        run: |
          # Création du projet
          cordova create goku-app com.gokusensi.shop "GokuSensei"
          cd goku-app
          cordova platform add ios
          
          # Téléchargement des ressources
          mkdir -p res/ios
          curl -L -o res/ios/icon.png "https://files.catbox.moe/pukmfj.jpg"
          curl -L -o res/ios/splash.png "https://files.catbox.moe/pukmfj.jpg"

          # Configuration de la détection réseau intelligente
          # Si navigator.onLine est vrai (WiFi/Data), on va sur le site. Sinon, page offline.
          cat <<EOF > www/index.html
          <!DOCTYPE html><html><head><meta charset="UTF-8">
          <script>
            function check() {
              if (navigator.onLine) { window.location.href = "https://gokusensi.com"; }
              else { window.location.href = "offline.html"; }
            }
            window.onload = check;
          </script></head><body style="background:#000"></body></html>
          EOF

          # Page Hors-ligne
          cat <<EOF > www/offline.html
          <!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>body{background:#000;color:white;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center;}
          .card{padding:20px;}h1{color:#00d1ff;}.btn{background:white;color:black;padding:12px 25px;border-radius:15px;text-decoration:none;font-weight:bold;display:inline-block;margin-top:20px;}</style></head>
          <body><div class="card"><h1>Pas de connexion</h1><p>Verifiez votre Wifi ou vos donnees mobiles.</p><a href="index.html" class="btn">Reessayer</a></div></body></html>
          EOF

          # Injection de la configuration dans le XML
          # On autorise TOUT pour éviter les blocages iOS
          node -e "
          const fs = require('fs');
          let c = fs.readFileSync('config.xml', 'utf8');
          const ext = '\n  <access origin=\"*\" />\n  <allow-navigation href=\"*\" />\n  <allow-intent href=\"*\" />\n  <platform name=\"ios\">\n    <icon src=\"res/ios/icon.png\" />\n    <splash src=\"res/ios/splash.png\" />\n    <preference name=\"AutoHideSplashScreen\" value=\"true\" />\n    <preference name=\"SplashScreenDelay\" value=\"3000\" />\n  </platform>\n';
          fs.writeFileSync('config.xml', c.replace('</widget>', ext + '</widget>'));
          "

      - name: Xcode Compilation
        run: |
          cd goku-app/platforms/ios
          proj=$(ls -d *.xcodeproj | head -n 1)
          scheme=${proj%.xcodeproj}
          xcodebuild -project "$proj" -scheme "$scheme" -configuration Release -sdk iphoneos -derivedDataPath "build_output" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build

      - name: Create Final IPA
        run: |
          mkdir -p Payload
          app=$(find goku-app/platforms/ios/build_output -name "*.app" -type d | head -n 1)
          cp -R "$app" Payload/
          zip -r GokuSensei_Final.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GokuSensei-Production
          path: GokuSensei_Final.ipa
