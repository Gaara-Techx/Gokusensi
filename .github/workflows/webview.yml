name: Compiler Gokusensi IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Installer Node.js et Cordova
      run: npm install -g cordova

    - name: Créer le projet iOS Cordova
      run: |
        cordova create goku-app com.gokusensi.shop "GokuSensei"
        cd goku-app
        node -e "
          const fs = require('fs');
          let config = fs.readFileSync('config.xml', 'utf8');
          config = config.replace('src=\"index.html\"', 'src=\"https://gokusensi.com\"');
          config = config.replace('</widget>', '  <allow-navigation href=\"https://gokusensi.com/*\" />\n</widget>');
          fs.writeFileSync('config.xml', config);
        "

    - name: Injecter le système Offline (Service Worker)
      run: |
        cd goku-app/www
        
        # 1. Création de la page offline.html locale dans l'app
        cat << 'EOF' > offline.html
        <!DOCTYPE html>
        <html lang="fr">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Hors ligne</title>
            <style>
                body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; color: #333; }
                h1 { color: #dd4b39; }
                p { font-size: 18px; }
                button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
            </style>
        </head>
        <body>
            <h1>Oops ! Vous êtes hors ligne</h1>
            <p>L'application GokuSensei nécessite une connexion internet.</p>
            <button onclick="window.location.reload()">Réessayer</button>
        </body>
        </html>
        EOF

        # 2. Création du fichier sw.js local dans l'app
        cat << 'EOF' > sw.js
        const CACHE_NAME = 'goku-offline-v1';
        const OFFLINE_URL = '/offline.html';

        self.addEventListener('install', (event) => {
            event.waitUntil(
                caches.open(CACHE_NAME).then((cache) => {
                    return cache.add(new Request(OFFLINE_URL, { cache: 'reload' }));
                })
            );
            self.skipWaiting();
        });

        self.addEventListener('activate', (event) => {
            event.waitUntil(self.clients.claim());
        });

        self.addEventListener('fetch', (event) => {
            if (event.request.mode === 'navigate') {
                event.respondWith(
                    fetch(event.request).catch(() => {
                        return caches.open(CACHE_NAME).then((cache) => {
                            return cache.match(OFFLINE_URL);
                        });
                    })
                );
            }
        });
        EOF

        # 3. Enregistrement du Service Worker dans le index.html de base de Cordova
        # (Au cas où le site ne charge pas du tout au premier démarrage)
        sed -i '' 's|</body>|<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("/sw.js");});}</script></body>|' index.html

    - name: Ajouter la plateforme iOS
      run: |
        cd goku-app
        cordova platform add ios

    - name: Compiler l'application (.app) avec Xcode Force
      run: |
        cd goku-app/platforms/ios
        PROJECT_NAME=$(ls -d *.xcodeproj | head -n 1)
        SCHEME_NAME=${PROJECT_NAME%.xcodeproj}
        
        xcodebuild -project "$PROJECT_NAME" \
          -scheme "$SCHEME_NAME" \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath "build_output" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          clean build

    - name: Structurer et empaqueter en fichier .IPA
      run: |
        mkdir -p ${{ github.workspace }}/ipa/Payload
        APP_PATH=$(find goku-app/platforms/ios/build_output -name "*.app" -type d | head -n 1)
        echo "Application trouvée ici : $APP_PATH"
        if [ -z "$APP_PATH" ]; then
          echo "ERREUR : Le build a échoué à produire un .app"
          exit 1
        fi
        cp -R "$APP_PATH" ${{ github.workspace }}/ipa/Payload/
        cd ${{ github.workspace }}/ipa
        zip -r ${{ github.workspace }}/GokuSensiz.ipa .

    - name: Mettre à disposition le fichier IPA
      uses: actions/upload-artifact@v4
      with:
        name: GokuSensiz-App-iOS
        path: ${{ github.workspace }}/GokuSensiz.ipa
