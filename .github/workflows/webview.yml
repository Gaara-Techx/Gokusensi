name: Compiler Gokusensi IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Installer Node.js et Cordova
      run: npm install -g cordova

    - name: Créer le projet iOS Cordova
      run: |
        cordova create goku-app com.gokusensi.shop "GokuSensei"
        cd goku-app
        node -e "
          const fs = require('fs');
          let config = fs.readFileSync('config.xml', 'utf8');
          config = config.replace('</widget>', '  <allow-navigation href=\"https://gokusensi.com/*\" />\n</widget>');
          fs.writeFileSync('config.xml', config);
        "

    - name: Configurer l'Icône
      run: |
        cd goku-app
        mkdir -p res/icon/ios
        curl -L "https://files.catbox.moe/pukmfj.jpg" -o res/icon/ios/icon.jpg
        # Correction du sed pour éviter le skip
        sed -i '' 's|</widget>|  <platform name="ios">\n    <icon src="res/icon/ios/icon.jpg" width="1024" height="1024" />\n  </platform>\n</widget>|' config.xml

    - name: Injecter l'interface (GokuSenseiz Styles)
      run: |
        cd goku-app/www
        
        # 1. PAGE DE CHARGEMENT (INDEX.HTML)
        cat << 'EOF' > index.html
        <!DOCTYPE html>
        <html lang="fr">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>GokuSenseiz | Chargement</title>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;900&display=swap" rel="stylesheet">
        <style>
            :root { --bg: #030303; --accent: #ffffff; --z-color: #ff3333; }
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { background-color: var(--bg); background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #030303 100%); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Outfit', sans-serif; overflow: hidden; }
            .wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 100%; max-width: 600px; padding: 20px; }
            .title-js { display: flex; gap: 15px; }
            .letter { position: relative; font-size: 8.5vw; font-weight: 900; color: transparent; -webkit-text-stroke: 1px rgba(255, 255, 255, 0.15); text-transform: uppercase; display: inline-block; opacity: 0; }
            .letter::before { content: attr(data-char); position: absolute; top: 0; left: 0; width: 100%; height: 100%; color: var(--accent); -webkit-text-stroke: 0px transparent; clip-path: inset(0 var(--clip-value, 100%) 0 0); }
            .z-char { -webkit-text-stroke: 1px rgba(255, 51, 51, 0.4); }
            .z-char::before { color: var(--z-color); filter: drop-shadow(0 0 10px rgba(255, 51, 51, 0.6)); }
            .scan-line { position: absolute; top: -20%; bottom: -20%; left: 0; width: 3px; background: #fff; box-shadow: 0 0 20px #fff, 0 0 40px var(--z-color); opacity: 0; z-index: 10; }
            @media (min-width: 768px) { .letter { font-size: 4.5rem; } }
        </style>
        </head>
        <body>
        <div class="wrapper">
            <div class="scan-line" id="scanner"></div>
            <div class="title-js" id="title">
                <span class="letter" data-char="G">G</span><span class="letter" data-char="O">O</span><span class="letter" data-char="K">K</span><span class="letter" data-char="U">U</span><span class="letter" data-char="S">S</span><span class="letter" data-char="E">E</span><span class="letter" data-char="N">N</span><span class="letter" data-char="S">S</span><span class="letter" data-char="E">E</span><span class="letter" data-char="I">I</span><span class="letter z-char" data-char="Z">Z</span>
            </div>
        </div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
        <script>
            const tl = anime.timeline();
            tl.add({ targets: '.letter', opacity: [0, 1], scale: [1.5, 1], duration: 700, delay: anime.stagger(40), easing: 'easeOutExpo' });
            tl.add({ targets: '#title', gap: ['15px', '2px'], duration: 800 }, '-=600');
            tl.add({ targets: '.letter', update: (anim) => { document.querySelectorAll('.letter').forEach((el, i) => { el.style.setProperty('--clip-value', (100 - anim.progress) + '%'); }); }, duration: 700 }, '-=800');
            tl.add({ targets: '#scanner', left: ['-5%', '105%'], opacity: [0, 1, 0], duration: 700 }, '-=700');
            
            if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js"); }
            window.onload = () => { setTimeout(() => { window.location.href = navigator.onLine ? "https://gokusensi.com" : "offline.html"; }, 1500); };
        </script>
        </body>
        </html>
        EOF

        # 2. PAGE OFFLINE (OFFLINE.HTML)
        cat << 'EOF' > offline.html
        <!DOCTYPE html>
        <html lang="fr">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Signal Perdu | GokuSenseiz</title>
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
        <style>
            body { background: #030303; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
            .lost-container { max-width: 400px; text-align: center; background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 40px; }
            .logo { font-size: 1.4rem; font-weight: 800; margin-bottom: 30px; }
            .logo span { color: #555; }
            .btn-reconnect { display: block; width: 100%; background: #111; color: white; padding: 16px; border-radius: 18px; text-decoration: none; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; }
            .btn-reconnect:hover { background: #fff; color: #00; }
        </style>
        </head>
        <body>
        <div class="lost-container">
            <div class="logo">Goku<span>Senseiz.</span></div>
            <h1 style="font-size:2rem;">Hors ligne</h1>
            <p style="color:#666;">La connexion avec GokuSenseiz a été interrompue.</p>
            <a href="index.html" class="btn-reconnect">Réessayer</a>
        </div>
        </body>
        </html>
        EOF

        # 3. SERVICE WORKER
        cat << 'EOF' > sw.js
        const CACHE_NAME = 'goku-v1';
        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['offline.html', 'index.html']))));
        self.addEventListener('fetch', e => { if (e.request.mode === 'navigate') e.respondWith(fetch(e.request).catch(() => caches.match('offline.html'))); });
        EOF

    - name: Ajouter la plateforme iOS
      run: |
        cd goku-app
        cordova platform add ios

    - name: Compiler l'application (.app)
      run: |
        cd goku-app/platforms/ios
        # Utilisation de iphonesimulator pour éviter les erreurs de signature (Exit Code 65)
        xcodebuild -project "App.xcodeproj" \
          -scheme "App" \
          -configuration Release \
          -sdk iphonesimulator \
          -derivedDataPath "build_output" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          clean build

    - name: Créer le fichier .IPA
      run: |
        mkdir -p ${{ github.workspace }}/ipa/Payload
        APP_PATH=$(find goku-app/platforms/ios/build_output -name "*.app" -type d | head -n 1)
        cp -R "$APP_PATH" ${{ github.workspace }}/ipa/Payload/
        cd ${{ github.workspace }}/ipa
        zip -r ${{ github.workspace }}/GokuSensiz.ipa .

    - name: Télécharger l'IPA
      uses: actions/upload-artifact@v4
      with:
        name: GokuSensiz-IPA
        path: ${{ github.workspace }}/GokuSensiz.ipa
