name: Compiler Gokusensi IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Installer Node.js et Cordova
      run: npm install -g cordova

    - name: Créer le projet iOS Cordova
      run: |
        cordova create goku-app com.gokusensi.shop "GokuSensei"
        cd goku-app
        node -e "
          const fs = require('fs');
          let config = fs.readFileSync('config.xml', 'utf8');
          config = config.replace('</widget>', '  <allow-navigation href=\"https://gokusensi.com/*\" />\n</widget>');
          fs.writeFileSync('config.xml', config);
        "

    - name: Configurer l'Icône
      run: |
        cd goku-app
        mkdir -p res/icon/ios
        curl -L "https://files.catbox.moe/pukmfj.jpg" -o res/icon/ios/icon.jpg
        sed -i '' 's|</widget>|  <platform name=\"ios\">\n    <icon src=\"res/icon/ios/icon.jpg\" width=\"1024\" height=\"1024\" />\n  </platform>\n</widget>|' config.xml

    - name: Injecter l'interface (Spinner + Offline + SW)
      run: |
        cd goku-app/www
        cat << 'EOF' > index.html
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>GokuSensei</title>
            <style>
                body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
                .loader { border: 4px solid #333; border-top: 4px solid #f0c14b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
                @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
            </style>
        </head>
        <body>
            <div style="text-align:center">
                <div class="loader"></div>
                <p>Chargement...</p>
            </div>
            <script>
                if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js"); }
                window.onload = () => {
                    setTimeout(() => {
                        window.location.href = navigator.onLine ? "https://gokusensi.com" : "offline.html";
                    }, 1500);
                };
            </script>
        </body>
        </html>
        EOF

        cat << 'EOF' > offline.html
        <!DOCTYPE html>
        <html><body style="background:#111;color:white;text-align:center;padding:50px;font-family:sans-serif;">
            <h1>Hors ligne</h1><p>Vérifiez votre connexion.</p>
            <button onclick="window.location.href='index.html'" style="padding:10px 20px;background:#f0c14b;border:none;border-radius:5px;">Réessayer</button>
        </body></html>
        EOF

        cat << 'EOF' > sw.js
        const CACHE_NAME = 'goku-v1';
        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['offline.html', 'index.html']))));
        self.addEventListener('fetch', e => {
            if (e.request.mode === 'navigate') e.respondWith(fetch(e.request).catch(() => caches.match('offline.html')));
        });
        EOF

    - name: Ajouter la plateforme iOS
      run: |
        cd goku-app
        cordova platform add ios

    - name: Compiler l'application (.app)
      run: |
        cd goku-app/platforms/ios
        PROJECT_NAME=$(ls -d *.xcodeproj | head -n 1)
        # On utilise 'Generic iOS Device' pour éviter les erreurs de destination
        xcodebuild -project "$PROJECT_NAME" \
          -scheme "GokuSensei" \
          -configuration Release \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          -derivedDataPath "build_output" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          clean build

    - name: Créer le fichier .IPA
      run: |
        mkdir -p ${{ github.workspace }}/ipa/Payload
        APP_PATH=$(find goku-app/platforms/ios/build_output -name "*.app" -type d | head -n 1)
        cp -R "$APP_PATH" ${{ github.workspace }}/ipa/Payload/
        cd ${{ github.workspace }}/ipa
        zip -r ${{ github.workspace }}/GokuSensiz.ipa .

    - name: Télécharger l'IPA
      uses: actions/upload-artifact@v4
      with:
        name: GokuSensiz-IPA
        path: ${{ github.workspace }}/GokuSensiz.ipa
